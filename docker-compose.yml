# This is the docker-compose file with L2 for the Kurtosis preconfirm devnet package.
services:  
    shasta-deployer:
        container_name: shasta-deployer
        image: ${TAIKO_PROTOCOL_SHASTA_IMAGE}
        volumes:
            - ./script:/deployer:rw
            - ./deployments:/deployments:rw
        env_file:
            - .env
        command:
            - /deployer/shasta-deployer.sh
        networks:
            - preconf
        extra_hosts:
            - "host.docker.internal:host-gateway"
        profiles:
            - deploy

    transfer-funds:
        container_name: transfer-funds
        image: ghcr.io/foundry-rs/foundry:stable
        restart: "no"
        volumes:
            - ./script:/script:ro
            - ./.env:/envfile:ro
        working_dir: /tmp
        entrypoint: ["/bin/sh", "-c"]
        command:
            - |
                cp -r /script ./script && cd ./script \
                chmod +x ./transfer_funds_and_add_operator.sh && \
                ./transfer_funds_and_add_operator.sh
        env_file:
            - .env
        networks:
            - preconf
        extra_hosts:
            - "host.docker.internal:host-gateway"
        profiles:
            - stack

    p2p-bootnode:
        container_name: p2p-bootnode
        image: nethermind/catalyst-p2p-bootnode:latest
        command:
            - p2p-boot-node
            - p2p-bootnode
            - "9000"
        networks:
            - preconf
        volumes:
            - bootnode-data:/tmp:rw
        profiles:
            - stack

    taiko-geth-1:
        container_name: taiko-geth-1
        image: ${TAIKO_GETH_IMAGE}
        restart: unless-stopped
        pull_policy: always
        extra_hosts:
            - "host.docker.internal:host-gateway"
        volumes:
            - ./jwtsecret.hex:/jwtsecret.hex:ro # Generate with `openssl rand -hex 32 | tr -d "\n" > jwtsecret.hex`
            - taiko-geth-data-1:/data/taiko-geth
            - ./geth-1-nodekey:/data/taiko-geth/geth/nodekey:ro
            - ./geth-1-config.toml:/data/taiko-geth/geth/config.toml:ro
        ports:
            - "${PORT_L2_EXECUTION_ENGINE_1_HTTP}:8545"
            - "${PORT_L2_EXECUTION_ENGINE_1_WS}:8546"
            - "${PORT_L2_EXECUTION_ENGINE_1_AUTH}:8551"
        networks:
            preconf:
                aliases:
                    - taiko-el-1
        labels:
            metrics_enabled: "true"
            #metrics_port: "6060"
            logs_enabled: "true"
            custom_operator: "dev"
            custom_network: "dev"
        env_file:
            - .env
        command:
            - '--syncmode=snap'
            - '--cache=4096'
            - '--maxpeers=100'
            - '--maxpendpeers=50'
            - '--txpool.globalslots=10000'
            - '--txpool.globalqueue=10000'
            - '--rpc.batch-request-limit=5000'
            - '--rpc.batch-response-max-size=50000000'
            - '--rpc.txfeecap=10'
            - '--gcmode=archive'
            - '--datadir=/data/taiko-geth'
            - '--networkid=${L2_CHAIN_ID}'
            - '--port=30303'
            - '--nodiscover'
            - '--metrics'
            - '--metrics.addr=0.0.0.0'
            #- '--metrics.port=6060'
            - '--http'
            - '--http.addr=0.0.0.0'
            - '--http.vhosts=*'
            - '--http.corsdomain=*'
            - '--ws'
            - '--ws.addr=0.0.0.0'
            - '--ws.origins=*'
            - '--authrpc.addr=0.0.0.0'
            - '--authrpc.port=8551'
            - '--authrpc.vhosts=*'
            - '--authrpc.jwtsecret=/jwtsecret.hex'
            - '--allow-insecure-unlock'
            - '--http.api=admin,debug,eth,net,web3,txpool,miner,taiko'
            - '--ws.api=admin,debug,eth,net,web3,txpool,miner,taiko'
            - '--taiko'
            - '--config=/data/taiko-geth/geth/config.toml'
            - '--nodekey=/data/taiko-geth/geth/nodekey'
            - '--taiko.internal-shasta-time=${TAIKO_INTERNAL_SHASTA_TIME}'
        profiles:
            - taiko-el-geth
    
    taiko-nethermind-1:
        container_name: taiko-nethermind-1
        image: ${NETHERMIND_CLIENT_IMAGE}
        restart: unless-stopped
        pull_policy: always
        extra_hosts:
            - "host.docker.internal:host-gateway"
        volumes:
            - ./jwtsecret.hex:/jwtsecret.hex:ro # Generate with `openssl rand -hex 32 | tr -d "\n" > jwtsecret.hex`
            - taiko-nethermind-data-1:/data/nethermind
            - ./static/taiko-shasta-chainspec.json:/taiko-shasta-chainspec.json:ro
            - ./nethermind-1-nodekey:/nodekey:ro
            - ./nethermind-1-static-nodes.json:/static-nodes.json:ro
        ports:
            - "${PORT_L2_EXECUTION_ENGINE_1_HTTP}:8545"
            - "${PORT_L2_EXECUTION_ENGINE_1_WS}:8546"
            - "${PORT_L2_EXECUTION_ENGINE_1_AUTH}:8551"
        networks:
            preconf:
                aliases:
                    - taiko-el-1
        labels:
            metrics_enabled: "true"
            logs_enabled: "true"
            custom_operator: "dev"
            custom_network: "dev"
        env_file:
            - .env
        entrypoint: ["/bin/sh", "-c"]
        command:
            - |
                NODEKEY=$$(tr -d '[:space:]' < /nodekey) && \
                exec /nethermind/nethermind \
                  --data-dir /data/nethermind \
                  --config=none \
                  --Init.ChainSpecPath=/taiko-shasta-chainspec.json \
                  --Init.GenesisHash=$${L2_GENESIS_HASH} \
                  --jsonrpc-jwtsecretfile=/jwtsecret.hex \
                  --JsonRpc.Enabled=true \
                  --JsonRpc.Host=0.0.0.0 \
                  --JsonRpc.Port=8545 \
                  --JsonRpc.EnabledModules=debug,eth,net,web3,txpool,rpc,subscribe,trace,personal,proof,parity,health \
                  --JsonRpc.EngineHost=0.0.0.0 \
                  --JsonRpc.EnginePort=8551 \
                  --JsonRpc.WebSocketsPort=8546 \
                  --Metrics.Enabled=true \
                  --Metrics.ExposeHost=0.0.0.0 \
                  --Network.P2PPort=30304 \
                  --Network.DiscoveryPort=30304 \
                  --Network.OnlyStaticPeers=true \
                  --Init.StaticNodesPath=/static-nodes.json \
                  --KeyStore.TestNodeKey=$$NODEKEY \
                  --JsonRpc.MaxBatchResponseBodySize=120000000 \
                  --Sync.FastSync=false \
                  --Sync.SnapSync=false \
                  --Seq.MinLevel=Info \
                  --Seq.ServerUrl=https://seq.nethermind.io \
                  --Pruning.PruningBoundary=1000 \
                  --log=debug
        profiles:
            - taiko-el-nethermind

    alethia-reth-1:
        container_name: alethia-reth-1
        image: ${ALETHIA_RETH_IMAGE}
        restart: unless-stopped
        pull_policy: always
        extra_hosts:
            - "host.docker.internal:host-gateway"
        volumes:
            - ./jwtsecret.hex:/jwtsecret.hex:ro # Generate with `openssl rand -hex 32 | tr -d "\n" > jwtsecret.hex`
            - alethia-reth-data-1:/data/alethia-reth
            - ./alethia-reth-1-nodekey:/node-keys/node-key:ro
        ports:
            - "${PORT_L2_EXECUTION_ENGINE_1_HTTP}:8545"
            - "${PORT_L2_EXECUTION_ENGINE_1_WS}:8546"
            - "${PORT_L2_EXECUTION_ENGINE_1_AUTH}:8551"
        networks:
            preconf:
                aliases:
                    - taiko-el-1
        labels:
            metrics_enabled: "true"
            logs_enabled: "true"
            custom_operator: "dev"
            custom_network: "dev"
        env_file:
            - .env
        command:
            - ./alethia-reth
            - node
            - --http
            - --http.addr=0.0.0.0
            - --http.api=eth,net,debug,trace,rpc
            - --ws
            - --ws.addr=0.0.0.0
            - --chain=devnet
            - --datadir=/data/alethia-reth
            - --log.file.directory=/data/alethia-reth/logs
            - --metrics=0.0.0.0:6060
            - --color=never
            - --enable-discv5-discovery
            - --engine.persistence-threshold=0
            - --engine.memory-block-buffer-target=0
            - --rpc.eth-proof-window=1209600
            - --devnet-unzen-timestamp=${UNZEN_FORK_TIME}
            - --p2p-secret-key=/node-keys/node-key
            - --trusted-peers=enode://09c3f502ca7e83c1abaf6e44a2a15f2b30579ec187a6662685330e54d173ea0df02f878fb3d0332bd107f1e542edb6b1dc9828bd4795224953b6ec9dacd3a862@alethia-reth-2:30303 
            - --authrpc.addr=0.0.0.0
            - --authrpc.jwtsecret=/jwtsecret.hex
            - --ipcpath=/data/alethia-reth/reth.ipc
            - --txpool.max-account-slots=1000000
        profiles:
            - taiko-el-alethia-reth

    taiko-client-rs-1:
        container_name: taiko-client-rs-1
        image: ${TAIKO_CLIENT_RS_IMAGE}
        restart: unless-stopped
        pull_policy: always
        extra_hosts:
            - "host.docker.internal:host-gateway"
        volumes:
            - ./jwtsecret.hex:/jwtsecret.hex:ro # Generate with `openssl rand -hex 32 | tr -d "\n" > jwtsecret.hex`
            - ./p2psecret-1.hex:/p2psecret.hex:ro # Generate with `openssl rand -hex 32 | tr -d "\n" > p2psecret.hex`
            - bootnode-data:/bootnode:ro
        ports:
            # P2P
            - "${PORT_P2P_DRIVER_1}:9000"
            # Metrics
            # - 6060:6061
        networks:
            preconf:
                aliases:
                    - taiko-client-1
        labels:
            metrics_enabled: "true"
            metrics_port: "6061"
            logs_enabled: "true"
            custom_operator: "dev"
            custom_network: "dev"
        # Inherit env vars from parent process
        env_file:
            - .env
            - ./env-stack/.env.stack-1
        depends_on:
            - p2p-bootnode
        entrypoint: ["/bin/sh", "-c"]
        command:
            - |
                export ENR=$$(cat /bootnode/enr) && \
                exec /app/taiko-client whitelist-preconfirmation-driver \
                  --l1.ws=$${L1_ENDPOINT_WS} \
                  --l1.beacon=$${L1_BEACON_HTTP} \
                  --jwt.secret=/jwtsecret.hex \
                  --l2.http=http://taiko-el-1:8545 \
                  --l2.auth=http://taiko-el-1:8551 \
                  --shasta.inbox=$${SHASTA_INBOX} \
                  --shasta.preconf-whitelist=$${SHASTA_PRECONF_WHITELIST} \
                  --preconfirmation.rpc-addr=0.0.0.0:1235 \
                  --preconfirmation.p2p-signer-key=$${PRECONFIRMATION_P2P_SEQUENCER_KEY} \
                  --p2p.listen=0.0.0.0:9000 \
                  --p2p.static-peers=/dns4/taiko-client-2/tcp/9000 \
                  --metrics.enabled \
                  --verbosity=4 \
                  --devnet-unzen-timestamp=$${UNZEN_FORK_TIME}
        profiles:
            - taiko-client-rs

    taiko-client-go-1:
        container_name: taiko-client-go-1
        image: ${TAIKO_CLIENT_IMAGE}
        restart: unless-stopped
        pull_policy: always
        extra_hosts:
            - "host.docker.internal:host-gateway"
        volumes:
            - ./jwtsecret.hex:/jwtsecret.hex:ro # Generate with `openssl rand -hex 32 | tr -d "\n" > jwtsecret.hex`
            - ./p2psecret-1.hex:/p2psecret.hex:ro # Generate with `openssl rand -hex 32 | tr -d "\n" > p2psecret.hex`
            - bootnode-data:/bootnode:ro
        ports:
            # P2P
            - "${PORT_P2P_DRIVER_1}:9000"
            # Metrics
            # - 6060:6061
        networks:
            preconf:
                aliases:
                    - taiko-client-1
        labels:
            metrics_enabled: "true"
            metrics_port: "6061"
            logs_enabled: "true"
            custom_operator: "dev"
            custom_network: "dev"
        # Inherit env vars from parent process
        env_file:
            - .env
            - ./env-stack/.env.stack-1
        depends_on:
            - p2p-bootnode
        entrypoint: ["/bin/sh", "-c"]
        command:
            - |
                export ENR=$$(cat /bootnode/enr) && \
                exec taiko-client driver \
                  --l1.ws=$${L1_ENDPOINT_WS} \
                  --l1.beacon=$${L1_BEACON_HTTP} \
                  --jwtSecret=/jwtsecret.hex \
                  --l2.ws=ws://taiko-el-1:8546 \
                  --l2.auth=http://taiko-el-1:8551 \
                  --preconfirmation.serverPort=1235 \
                  --preconfirmation.jwtSecret=/jwtsecret.hex \
                  --p2p.priv.path=/p2psecret.hex \
                  --p2p.listen.tcp=9000 \
                  --p2p.listen.udp=9000 \
                  --p2p.useragent=taiko \
                  --p2p.disable=false \
                  --metrics=true \
                  --verbosity=4 \
                  --inbox=$${SHASTA_INBOX} \
                  --taikoAnchor=$${TAIKO_ANCHOR} \
                  --taiko.devnet-unzen-time=$${UNZEN_FORK_TIME} \
                  --p2p.advertise.ip=taiko-client-1 \
                  --p2p.bootnodes=$$ENR
        profiles:
            - taiko-client-go

    catalyst-node-1:
        container_name: catalyst-node-1
        image: ${CATALYST_IMAGE}
        restart: unless-stopped
        pull_policy: always
        volumes:
            - ./jwtsecret.hex:/jwtsecret.hex:ro
        # ports:
            # Metrics
            # - 9898:9898
        networks:
            - preconf
        labels:
            metrics_enabled: "true"
            metrics_port: "9898"
            logs_enabled: "true"
            custom_operator: "dev"
            custom_network: "dev"
        # Inherit env vars from parent process
        env_file:
            - .env
            - ./env-stack/.env.stack-1
        extra_hosts:
            - "host.docker.internal:host-gateway"
        depends_on:
            transfer-funds:
                condition: service_completed_successfully
            web3signer_l1:
                condition: service_started
            web3signer_l2:
                condition: service_started
        profiles:
            - stack

    web3signer_l1:
        container_name: web3signer_l1
        image: consensys/web3signer:25.11.0
        restart: unless-stopped
        pull_policy: always
        volumes:
        - ./docker/web3signer_config:/config
        networks:
        - preconf
        command:
        - '--key-store-path=/config'
        - '--http-host-allowlist=*'
        - 'eth1'
        - '--chain-id=${L1_CHAIN_ID}'
        profiles:
            - stack

    web3signer_l2:
        container_name: web3signer_l2
        image: consensys/web3signer:25.11.0
        restart: unless-stopped
        pull_policy: always
        volumes:
        - ./docker/web3signer_config:/config
        networks:
        - preconf
        command:
        - '--key-store-path=/config'
        - '--http-host-allowlist=*'
        - 'eth1'
        - '--chain-id=${L2_CHAIN_ID}'
        profiles:
            - stack



