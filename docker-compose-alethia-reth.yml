# This is the docker-compose file with L2 for the Kurtosis preconfirm devnet package.
services:
    pacaya-deployer:
        container_name: pacaya-deployer
        image: ${TAIKO_PROTOCOL_PACAYA_IMAGE}
        volumes:
            - ./script:/deployer:rw
            - ./deployments:/deployments:rw
        env_file:
            - .env
        command:
            - /deployer/pacaya-deployer.sh
        networks:
            - preconf
        extra_hosts:
            - "host.docker.internal:host-gateway"
        profiles:
            - deploy
    
    shasta-deployer:
        container_name: shasta-deployer
        image: ${TAIKO_PROTOCOL_SHASTA_IMAGE}
        volumes:
            - ./script:/deployer:rw
            - ./deployments:/deployments:rw
        env_file:
            - .env
        command:
            - /deployer/shasta-deployer.sh
        networks:
            - preconf
        extra_hosts:
            - "host.docker.internal:host-gateway"
        profiles:
            - deploy

    transfer-funds:
        container_name: transfer-funds
        image: ghcr.io/foundry-rs/foundry:stable
        restart: "no"
        volumes:
            - ./script:/script:ro
            - ./.env:/envfile:ro
        working_dir: /tmp
        entrypoint: ["/bin/sh", "-c"]
        command:
            - |
                cp -r /script ./script && cd ./script \
                chmod +x ./transfer_funds_and_add_operator.sh && \
                ./transfer_funds_and_add_operator.sh
        env_file:
            - .env
        networks:
            - preconf
        extra_hosts:
            - "host.docker.internal:host-gateway"
        profiles:
            - stack

    p2p-bootnode:
        container_name: p2p-bootnode
        image: nethswitchboard/bootnode-p2p:whitelist
        command:
            - p2p-boot-node
            - p2p-bootnode
            - "9000"
        networks:
            - preconf
        volumes:
            - bootnode-data:/tmp:rw
        profiles:
            - stack

    fork-switch:
        container_name: fork-switch
        build:
            context: ./shasta-pacay-transition
            dockerfile: Dockerfile
        restart: on-failure
        networks:
            - preconf
        env_file:
            - .env
            - ./env-stack/.env.stack-1-reth
        extra_hosts:
            - "host.docker.internal:host-gateway"
        profiles:
            - stack

    alethia-reth-1:
        container_name: alethia-reth-1
        image: ${ALETHIA_RETH_IMAGE}
        restart: unless-stopped
        pull_policy: always
        extra_hosts:
            - "host.docker.internal:host-gateway"
        volumes:
            - ./jwtsecret.hex:/jwtsecret.hex:ro # Generate with `openssl rand -hex 32 | tr -d "\n" > jwtsecret.hex`
            - alethia-reth-data-1:/data/alethia-reth
            - ./alethia-reth-1-nodekey:/node-keys/node-key:ro
        ports:
            - "${PORT_L2_EXECUTION_ENGINE_1_METRICS}:6060"
            - "${PORT_L2_EXECUTION_ENGINE_1_HTTP}:8545"
            - "${PORT_L2_EXECUTION_ENGINE_1_WS}:8546"
            - "${PORT_L2_EXECUTION_ENGINE_1_P2P}:30303"
            - "${PORT_L2_EXECUTION_ENGINE_1_P2P}:30303/udp"
            - "${PORT_L2_EXECUTION_ENGINE_1_AUTH}:8551"
        networks:
            - preconf
        labels:
            metrics_enabled: "true"
            logs_enabled: "true"
            custom_operator: "dev"
            custom_network: "dev"
        env_file:
            - .env
        command:
            - ./alethia-reth
            - node
            - --http
            - --http.addr=0.0.0.0
            - --http.api=eth,net,debug,trace,rpc
            - --ws
            - --ws.addr=0.0.0.0
            - --chain=devnet
            - --datadir=/data/alethia-reth
            - --log.file.directory=/data/alethia-reth/logs
            - --metrics=0.0.0.0:6060
            - --color=never
            - --enable-discv5-discovery
            - --engine.persistence-threshold=0
            - --engine.memory-block-buffer-target=0
            - --rpc.eth-proof-window=1209600
            - --devnet-uzen-timestamp=1864670179
            - --p2p-secret-key=/node-keys/node-key
            - --trusted-peers=enode://09c3f502ca7e83c1abaf6e44a2a15f2b30579ec187a6662685330e54d173ea0df02f878fb3d0332bd107f1e542edb6b1dc9828bd4795224953b6ec9dacd3a862@alethia-reth-2:30303 
            - --authrpc.addr=0.0.0.0
            - --authrpc.jwtsecret=/jwtsecret.hex
            - --ipcpath=/data/alethia-reth/reth.ipc
        profiles:
            - stack

    taiko-driver-1:
        container_name: taiko-driver-1
        image: ${TAIKO_CLIENT_IMAGE}
        restart: unless-stopped
        pull_policy: always
        extra_hosts:
            - "host.docker.internal:host-gateway"
        volumes:
            - ./jwtsecret.hex:/jwtsecret.hex:ro # Generate with `openssl rand -hex 32 | tr -d "\n" > jwtsecret.hex`
            - ./p2psecret-1.hex:/p2psecret.hex:ro # Generate with `openssl rand -hex 32 | tr -d "\n" > p2psecret.hex`
            - bootnode-data:/bootnode:ro
        ports:
            # P2P
            - "${PORT_P2P_DRIVER_1}:9000"
            # Metrics
            # - 6060:6061
        networks:
            - preconf
        labels:
            metrics_enabled: "true"
            metrics_port: "6061"
            logs_enabled: "true"
            custom_operator: "dev"
            custom_network: "dev"
        # Inherit env vars from parent process
        env_file:
            - .env
            - ./env-stack/.env.stack-1-reth
        depends_on:
            - alethia-reth-1
            - p2p-bootnode
        entrypoint: ["/bin/sh", "-c"]
        command:
            - |
                export ENR=$$(cat /bootnode/enr) && \
                exec taiko-client driver \
                  --l1.ws=$${L1_ENDPOINT_WS} \
                  --l1.beacon=$${L1_BEACON_HTTP} \
                  --jwtSecret=/jwtsecret.hex \
                  --l2.ws=ws://alethia-reth-1:8546 \
                  --l2.auth=http://alethia-reth-1:8551 \
                  --preconfirmation.serverPort=1235 \
                  --p2p.priv.path=/p2psecret.hex \
                  --p2p.listen.tcp=9000 \
                  --p2p.listen.udp=9000 \
                  --p2p.useragent=taiko \
                  --p2p.disable=false \
                  --metrics=true \
                  --verbosity=4 \
                  --inbox=$${SHASTA_INBOX} \
                  --taikoAnchor=$${TAIKO_ANCHOR} \
                  --taiko.devnet-uzen-time=$${UZEN_FORK_TIME} \
                  --p2p.advertise.ip=taiko-driver-1 \
                  --p2p.bootnodes=$$ENR
        profiles:
            - stack

    catalyst-node-1:
        container_name: catalyst-node-1
        image: ${CATALYST_IMAGE}
        restart: unless-stopped
        pull_policy: always
        volumes:
            - ./jwtsecret.hex:/jwtsecret.hex:ro
        # ports:
            # Metrics
            # - 9898:9898
        networks:
            - preconf
        labels:
            metrics_enabled: "true"
            metrics_port: "9898"
            logs_enabled: "true"
            custom_operator: "dev"
            custom_network: "dev"
        # Inherit env vars from parent process
        env_file:
            - .env
            - ./env-stack/.env.stack-1-reth
        extra_hosts:
            - "host.docker.internal:host-gateway"
        depends_on:
            transfer-funds:
                condition: service_completed_successfully
            alethia-reth-1:
                condition: service_started
            taiko-driver-1:
                condition: service_started
            web3signer_l1:
                condition: service_started
            web3signer_l2:
                condition: service_started
        profiles:
            - stack

    web3signer_l1:
        container_name: web3signer_l1
        image: consensys/web3signer:25.11.0
        restart: unless-stopped
        pull_policy: always
        volumes:
        - ./docker/web3signer_config:/config
        networks:
        - preconf
        command:
        - '--key-store-path=/config'
        - '--http-host-allowlist=*'
        - 'eth1'
        - '--chain-id=${L1_CHAIN_ID}'
        profiles:
            - stack

    web3signer_l2:
        container_name: web3signer_l2
        image: consensys/web3signer:25.11.0
        restart: unless-stopped
        pull_policy: always
        volumes:
        - ./docker/web3signer_config:/config
        networks:
        - preconf
        command:
        - '--key-store-path=/config'
        - '--http-host-allowlist=*'
        - 'eth1'
        - '--chain-id=${L2_CHAIN_ID}'
        profiles:
            - stack



### stack #2

    alethia-reth-2:
        container_name: alethia-reth-2
        image: ${ALETHIA_RETH_IMAGE}
        restart: unless-stopped
        pull_policy: always
        extra_hosts:
            - "host.docker.internal:host-gateway"
        volumes:
            - ./jwtsecret.hex:/jwtsecret.hex:ro # Generate with `openssl rand -hex 32 | tr -d "\n" > jwtsecret.hex`
            - alethia-reth-data-2:/data/alethia-reth
            - ./alethia-reth-2-nodekey:/node-keys/node-key:ro
        ports:
            - "${PORT_L2_EXECUTION_ENGINE_2_METRICS}:6060"
            - "${PORT_L2_EXECUTION_ENGINE_2_HTTP}:8545"
            - "${PORT_L2_EXECUTION_ENGINE_2_WS}:8546"
            - "${PORT_L2_EXECUTION_ENGINE_2_P2P}:30303"
            - "${PORT_L2_EXECUTION_ENGINE_2_P2P}:30303/udp"
            - "${PORT_L2_EXECUTION_ENGINE_2_AUTH}:8551"
        networks:
