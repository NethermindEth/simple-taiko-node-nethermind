# Override file that swaps the Go taiko-client driver for the Rust taiko-client-rs.
#
# Usage:
#   docker compose \
#     -f docker-compose-nethermind.yml \
#     -f docker-compose-nethermind-rs.override.yml \
#     --profile stack up
#
# The Rust client uses different CLI flags and a different subcommand
# (`preconfirmation-driver` instead of `driver`), so this file fully replaces
# the entrypoint command on taiko-driver-1 and taiko-driver-2. It also drops
# the p2psecret volume mount because taiko-client-rs does not currently expose
# a CLI flag for a persistent libp2p identity (a fresh keypair is generated
# each run; PeerIDs change between restarts but discovery via the bootnode
# still works).
services:
    taiko-driver-1:
        image: ${TAIKO_CLIENT_RS_IMAGE}
        volumes:
            - ./jwtsecret.hex:/jwtsecret.hex:ro
            - bootnode-data:/bootnode:ro
        ports:
            # libp2p TCP listen
            - "${PORT_P2P_DRIVER_1}:9000/tcp"
            # discv5 UDP discovery
            - "${PORT_P2P_DRIVER_1}:9001/udp"
        command:
            - |
                export ENR=$$(cat /bootnode/enr) && \
                exec /app/taiko-client preconfirmation-driver \
                  --l1.ws=$${L1_ENDPOINT_WS} \
                  --l1.beacon=$${L1_BEACON_HTTP} \
                  --jwt.secret=/jwtsecret.hex \
                  --l2.http=http://taiko-nethermind-1:8547 \
                  --l2.auth=http://taiko-nethermind-1:8552 \
                  --shasta.inbox=$${SHASTA_INBOX} \
                  --p2p.listen=0.0.0.0:9000 \
                  --p2p.discovery.addr=0.0.0.0:9001 \
                  --p2p.bootnodes=$$ENR \
                  --preconf.rpc.addr=0.0.0.0:1235 \
                  --metrics.enabled \
                  --metrics.addr=0.0.0.0 \
                  --metrics.port=6061 \
                  --verbosity=3

    taiko-driver-2:
        image: ${TAIKO_CLIENT_RS_IMAGE}
        volumes:
            - ./jwtsecret.hex:/jwtsecret.hex:ro
            - bootnode-data:/bootnode:ro
        ports:
            - "${PORT_P2P_DRIVER_2}:9000/tcp"
            - "${PORT_P2P_DRIVER_2}:9001/udp"
        command:
            - |
                export ENR=$$(cat /bootnode/enr) && \
                exec /app/taiko-client preconfirmation-driver \
                  --l1.ws=$${L1_ENDPOINT_WS} \
                  --l1.beacon=$${L1_BEACON_HTTP} \
                  --jwt.secret=/jwtsecret.hex \
                  --l2.http=http://taiko-nethermind-2:8547 \
                  --l2.auth=http://taiko-nethermind-2:8552 \
                  --shasta.inbox=$${SHASTA_INBOX} \
                  --p2p.listen=0.0.0.0:9000 \
                  --p2p.discovery.addr=0.0.0.0:9001 \
                  --p2p.bootnodes=$$ENR \
                  --preconf.rpc.addr=0.0.0.0:1235 \
                  --metrics.enabled \
                  --metrics.addr=0.0.0.0 \
                  --metrics.port=6061 \
                  --verbosity=3
