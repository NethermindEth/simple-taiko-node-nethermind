# This is the docker-compose file with L2 using Nethermind for the Kurtosis preconfirm devnet package.
services:
    transfer-funds:
        container_name: transfer-funds
        image: ghcr.io/foundry-rs/foundry:stable
        restart: "no"
        volumes:
            - ./script:/script:ro
            - ./.env:/envfile:ro
        working_dir: /tmp
        entrypoint: ["/bin/sh", "-c"]
        command:
            - |
                cp -r /script ./script && cd ./script \
                chmod +x ./transfer_funds_and_add_operator.sh && \
                ./transfer_funds_and_add_operator.sh
        env_file:
            - .env
        networks:
            - preconf
        extra_hosts:
            - "host.docker.internal:host-gateway"
        profiles:
            - stack

    p2p-bootnode:
        container_name: p2p-bootnode
        image: nethswitchboard/bootnode-p2p:whitelist
        command:
            - p2p-boot-node
            - p2p-bootnode
            - "9000"
        networks:
            - preconf
        volumes:
            - bootnode-data:/tmp:rw
        profiles:
            - stack

    # One-shot helper that wires the two NMC instances as eth-protocol peers so they
    # can snap-sync between each other. Required because NMCs auto-generate node keys
    # and the chainspec ships no bootnode list for this local devnet — without this
    # service Connected: 0 forever (see notes/2026/04-28-nmc-investigate-that-rpc/
    # background-and-shura-log-analysis.md). Polls both eth-RPC endpoints, fetches each
    # node's enode via admin_nodeInfo, and calls admin_addPeer on the other.
    nmc-peering:
        container_name: nmc-peering
        image: curlimages/curl:8.10.1
        restart: "no"
        depends_on:
            taiko-nethermind-1:
                condition: service_started
            taiko-nethermind-2:
                condition: service_started
        networks:
            - preconf
        entrypoint: ["/bin/sh", "-c"]
        command:
            - |
                set -e
                wait_rpc() {
                  local url=$$1
                  for i in $$(seq 1 60); do
                    if curl -s -m 2 -X POST -H 'Content-Type: application/json' \
                         --data '{"jsonrpc":"2.0","method":"net_version","params":[],"id":1}' \
                         "$$url" >/dev/null 2>&1; then
                      return 0
                    fi
                    sleep 2
                  done
                  echo "Timeout waiting for $$url" >&2
                  return 1
                }
                get_enode() {
                  curl -s -X POST -H 'Content-Type: application/json' \
                    --data '{"jsonrpc":"2.0","method":"admin_nodeInfo","params":[],"id":1}' "$$1" \
                    | sed -n 's/.*"enode":"\([^"]*\)".*/\1/p'
                }
                add_peer() {
                  curl -s -X POST -H 'Content-Type: application/json' \
                    --data "{\"jsonrpc\":\"2.0\",\"method\":\"admin_addPeer\",\"params\":[\"$$1\"],\"id\":1}" "$$2"
                }
                URL1=http://taiko-nethermind-1:8547
                URL2=http://taiko-nethermind-2:8547
                echo "Waiting for both NMC RPCs to come up..."
                wait_rpc "$$URL1"
                wait_rpc "$$URL2"
                echo "Fetching enode URLs..."
                ENODE1=$$(get_enode "$$URL1")
                ENODE2=$$(get_enode "$$URL2")
                echo "NMC1 enode: $$ENODE1"
                echo "NMC2 enode: $$ENODE2"
                # Replace 127.0.0.1/0.0.0.0 placeholders with the docker DNS hostname so the
                # other side can actually reach the right interface.
                ENODE1_FIXED=$$(echo "$$ENODE1" | sed 's|@[0-9.]*:|@taiko-nethermind-1:|')
                ENODE2_FIXED=$$(echo "$$ENODE2" | sed 's|@[0-9.]*:|@taiko-nethermind-2:|')
                echo "Adding NMC2 as peer of NMC1..."
                add_peer "$$ENODE2_FIXED" "$$URL1"
                echo "Adding NMC1 as peer of NMC2..."
                add_peer "$$ENODE1_FIXED" "$$URL2"
                echo "Peering wired. Exiting."
        profiles:
            - stack

    taiko-nethermind-1:
        container_name: taiko-nethermind-1
        image: ${NETHERMIND_CLIENT_IMAGE}
        restart: unless-stopped
        pull_policy: always
        extra_hosts:
            - "host.docker.internal:host-gateway"
        volumes:
            - ./jwtsecret.hex:/jwtsecret.hex:ro # Generate with `openssl rand -hex 32 | tr -d "\n" > jwtsecret.hex`
            - taiko-nethermind-data-1:/data/nethermind
            - ./static/taiko-shasta-chainspec.json:/taiko-shasta-chainspec.json:ro
        ports:
            - "${PORT_L2_EXECUTION_ENGINE_1_METRICS}:9091"
            - "${PORT_L2_EXECUTION_ENGINE_1_HTTP}:8547"
            - "${PORT_L2_EXECUTION_ENGINE_1_WS}:8548"
            - "${PORT_L2_EXECUTION_ENGINE_1_P2P}:30304"
            - "${PORT_L2_EXECUTION_ENGINE_1_P2P}:30304/udp"
            - "${PORT_L2_EXECUTION_ENGINE_1_AUTH}:8552"
        networks:
            - preconf
        labels:
            metrics_enabled: "true"
            logs_enabled: "true"
            custom_operator: "dev"
            custom_network: "dev"
        env_file:
            - .env
        command:
            - './nethermind/nethermind'
            - '--data-dir=/data/nethermind'
            - '--config=none'
            - '--Init.ChainSpecPath=/taiko-shasta-chainspec.json'
            - '--Init.GenesisHash=${L2_GENESIS_HASH}'
            - '--Init.DiscoveryEnabled=true'
            - '--jsonrpc-jwtsecretfile=/jwtsecret.hex'
            - '--JsonRpc.Enabled=true'
            - '--JsonRpc.Host=0.0.0.0'
            - '--JsonRpc.Port=8547'
            - '--JsonRpc.EnabledModules=admin,debug,eth,net,web3,txpool,rpc,subscribe,trace,personal,proof,parity,health,taiko'
            - '--JsonRpc.EngineHost=0.0.0.0'
            - '--JsonRpc.EnginePort=8552'
            - '--JsonRpc.WebSocketsPort=8548'
            - '--Metrics.Enabled=true'
            - '--Metrics.ExposeHost=0.0.0.0'
            - '--Network.P2PPort=30304'
            - '--Network.DiscoveryPort=30304'
            - '--Network.OnlyStaticPeers=false'
            - '--JsonRpc.MaxBatchResponseBodySize=120000000'
            - '--Sync.FastSync=true'
            - '--Sync.SnapSync=true'
            - '--Sync.PivotNumber=0'
            - '--Sync.FastBlocks=true'
            - '--Sync.DownloadHeadersInFastSync=true'
            - '--Sync.DownloadBodiesInFastSync=true'
            - '--Sync.DownloadReceiptsInFastSync=true'
            - '--Seq.MinLevel=Info'
            - '--Seq.ServerUrl=https://seq.nethermind.io'
            - '--Pruning.PruningBoundary=1000'
            - '--log=debug'
        profiles:
            - stack

    taiko-driver-1:
        container_name: taiko-driver-1
        image: ${TAIKO_CLIENT_IMAGE}
        restart: unless-stopped
        pull_policy: always
        extra_hosts:
            - "host.docker.internal:host-gateway"
        volumes:
            - ./jwtsecret.hex:/jwtsecret.hex:ro # Generate with `openssl rand -hex 32 | tr -d "\n" > jwtsecret.hex`
            - ./p2psecret-1.hex:/p2psecret.hex:ro # Generate with `openssl rand -hex 32 | tr -d "\n" > p2psecret.hex`
            - bootnode-data:/bootnode:ro
        ports:
            # P2P
            - "${PORT_P2P_DRIVER_1}:9000"
            # Metrics
            # - 6060:6061
        networks:
            - preconf
        labels:
            metrics_enabled: "true"
            metrics_port: "6061"
            logs_enabled: "true"
            custom_operator: "dev"
            custom_network: "dev"
        # Inherit env vars from parent process
        env_file:
            - .env
            - ./env-stack/.env.stack-1-nmc
        depends_on:
            - taiko-nethermind-1
            - p2p-bootnode
        entrypoint: ["/bin/sh", "-c"]
        command:
            - |
                export ENR=$$(cat /bootnode/enr) && \
                exec taiko-client driver \
                  --l1.ws=$${L1_ENDPOINT_WS} \
                  --l1.beacon=$${L1_BEACON_HTTP} \
                  --jwtSecret=/jwtsecret.hex \
                  --l2.ws=ws://taiko-nethermind-1:8548 \
                  --l2.auth=http://taiko-nethermind-1:8552 \
                  --preconfirmation.serverPort=1235 \
                  --p2p.priv.path=/p2psecret.hex \
                  --p2p.listen.tcp=9000 \
                  --p2p.listen.udp=9000 \
                  --p2p.useragent=taiko \
                  --p2p.disable=false \
                  --p2p.advertise.ip=taiko-driver-1 \
                  --p2p.sync \
                  --p2p.checkPointSyncUrl=http://taiko-nethermind-2:8547 \
                  --p2p.syncTimeout=30m \
                  --metrics=true \
                  --verbosity=4 \
                  --inbox=$${SHASTA_INBOX} \
                  --taikoAnchor=$${TAIKO_ANCHOR} \
                  --taiko.devnet-unzen-time=$${UNZEN_FORK_TIME} \
                  --p2p.bootnodes=$$ENR
        profiles:
            - stack

    catalyst-node-1:
        container_name: catalyst-node-1
        image: ${CATALYST_IMAGE}
        restart: unless-stopped
        pull_policy: always
        volumes:
            - ./jwtsecret.hex:/jwtsecret.hex:ro
        # ports:
            # Metrics
            # - 9898:9898
        networks:
            - preconf
        labels:
            metrics_enabled: "true"
            metrics_port: "9898"
            logs_enabled: "true"
            custom_operator: "dev"
            custom_network: "dev"
        # Inherit env vars from parent process
        env_file:
            - .env
            - ./env-stack/.env.stack-1-nmc
        extra_hosts:
            - "host.docker.internal:host-gateway"
        depends_on:
            transfer-funds:
                condition: service_completed_successfully
            taiko-nethermind-1:
                condition: service_started
            taiko-driver-1:
                condition: service_started
            web3signer_l1:
                condition: service_started
            web3signer_l2:
                condition: service_started
        profiles:
            - stack

    web3signer_l1:
        container_name: web3signer_l1
        image: consensys/web3signer:25.11.0
        restart: unless-stopped
        pull_policy: always
        volumes:
        - ./docker/web3signer_config:/config
        networks:
        - preconf
        command:
        - '--key-store-path=/config'
        - '--http-host-allowlist=*'
        - 'eth1'
        - '--chain-id=${L1_CHAIN_ID}'
        profiles:
            - stack

    web3signer_l2:
        container_name: web3signer_l2
        image: consensys/web3signer:25.11.0
        restart: unless-stopped
        pull_policy: always
        volumes:
        - ./docker/web3signer_config:/config
        networks:
        - preconf
        command:
        - '--key-store-path=/config'
        - '--http-host-allowlist=*'
        - 'eth1'
        - '--chain-id=${L2_CHAIN_ID}'
        profiles:
            - stack


